server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/personal_blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    # username / password 在 application-local.yml
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  mail:
    host: smtp.qq.com
    port: 465
    # username / password 在 application-local.yml
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
  redis:
    host: localhost
    port: 6380
    # password 在 application-local.yml
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

# 阿里云 OSS
aliyun:
  oss:
    endpoint: oss-cn-shenzhen.aliyuncs.com
    # access-key-id / access-key-secret 在 application-local.yml
    bucket-name: personalblog-cwy

# 文件上传
file:
  upload:
    path: d:/develop/code/PersonalBlog/backend/uploads/avatars/

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # secret 在 application-local.yml
  expiration: 86400000
